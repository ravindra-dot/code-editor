<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CodeSphere</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Monaco -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>

    <style>
        #code {
            min-height: 400px;
            width: 100%;
            border: 1px solid #ddd;
            border-radius: 6px;
        }

        #explorer {
            width: 250px;
            min-width: 250px;
            transition: all 0.3s ease;
            overflow: hidden;
        }

        #explorer.collapsed {
            width: 0;
            min-width: 0;
            padding: 0;
            border: none;
        }

        /* Mobile editor height */
        @media (max-width:768px) {
            #code {
                min-height: 300px;
            }
        }
    </style>

</head>

<body class="bg-light">

                    <a class="nav-link text-warning" href="{{ url_for('logout') }}">Logout</a>
                </div>

            </div>
        </div>
    </nav>


    <div class="container-fluid mt-3">

        <div class="row">


            <!--Icon Bar -->

            <!-- Editor -->
            <div class="col-12 col-lg-9 mb-3 d-flex flex-column">

                <div class="card shadow-sm flex-grow-1">

                    <!-- Toolbar -->
                    <div class="card-header d-flex justify-content-between align-items-center flex-wrap gap-2">

                        <div class="d-flex align-items-center gap-2">

                            <strong>Code Editor</strong>

                            <select id="language-select" class="form-select form-select-sm w-auto">
                                <option value="python">Python</option>
                                <option value="c">C</option>
                                <option value="cpp">C++</option>
                            </select>

                        </div>

                        <button onclick="runCode()" class="btn btn-success btn-sm">
                            ▶ Run
                        </button>

                    </div>

                    <!-- Editor -->
                    <div id="code" class="flex-grow-1"></div>

                </div>
            </div>


            <!-- IO Panel -->
            <div class="col-12 col-lg-3 border-lg-start d-flex flex-column p-3">

                <h6>Input</h6>

                <textarea id="input-box" class="form-control mb-3" rows="6" style="resize:none;">
</textarea>

                <h6>Output</h6>

                <pre id="output-box" class="bg-dark text-light p-2 rounded overflow-auto" style="min-height:150px;">
</pre>

            </div>


        </div>
    </div>
